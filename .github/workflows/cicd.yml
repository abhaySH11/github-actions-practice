name: CICD

on:
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: clone code
        run: echo "clone"
  
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build using Docker
        run: echo "Building using Docker"
        
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test docker image
        run: echo "test docker"
      
  deploy:
    needs: [build,test]
    runs-on: ubuntu-latest
        steps:
      - name: Deploying on the machine
        run: echo "Deploying the code"
    
